# render.yaml - Render.com 배포 설정 (Blueprint)
# Render 대시보드에서 New > Blueprint 로 이 repo를 연결하면 아래 설정이 자동 적용된다.
# 무료 플랜(free)은 15분 미사용 시 잠들고, 디스크가 영구 저장이 아니라 재배포 시 초기화된다.
# (battery.db 의 이력은 데모 세션 동안 유지되며, 재배포 때 리셋됨 — 데모에는 충분)
services:
  - type: web
    name: battery-triage-map-api
    runtime: python
    plan: free
    branch: feat/api-rag-pdf          # 백엔드 최신 코드 브랜치 (main 머지 후 main 으로 변경 가능)
    # 패키지 설치 + DB 스키마/시드 준비
    buildCommand: "pip install -r requirements.txt && python data/init_db.py"
    # FastAPI 실행 — Render 가 주는 $PORT 에 바인딩해야 외부에서 접속된다
    startCommand: "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
    autoDeploy: true                  # 브랜치에 push 하면 자동 재배포
