services:
  - type: web
    name: battery-triage-map-api
    runtime: python
    plan: free
    branch: feat/api-rag-pdf
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        sync: false
    autoDeploy: true
