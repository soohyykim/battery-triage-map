databases:
  - name: battery-triage-db
    plan: free
    region: oregon

services:
  - type: web
    name: battery-triage-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: battery-triage-db
          property: connectionString
